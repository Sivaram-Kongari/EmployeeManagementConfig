server:
  port: 9090

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      mvc:
        routes:
          - id: employee-service
            uri: lb://EMPLOYEE-SERVICE
            predicates:
              - Path=/employees/**

          - id: department-service
            uri: lb://DEPARTMENT-SERVICE
            predicates:
              - Path=/departments/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/