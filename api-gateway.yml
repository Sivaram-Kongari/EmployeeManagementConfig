server:
  port: 9090

spring:
  application:
    name: API-GATEWAY

cloud:
   gateway:
      routes:
         - id: EMPLOYEE-SERVICE
           uri: lb://EMPLOYEE-SERVICE
           predicates:
              - Path=/employees/**
            
         - id: DEPARTMENT-SERVICE
           uri: lb://DEPARTMENT-SERVICE
           predicates:
              - Path=/departments/**

eureka:
   client:
      service-url:
         defaultZone: http://localhost:8761/eureka/