server:
  port: 9092

spring:
  application:
    name: DEPARTMENT-SERVICE-PRACTICE

  datasource:
    url: jdbc:mysql://localhost:3306/department_db
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8762/eureka/